version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    container_name: kg-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-graph_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-graph_password}
      POSTGRES_DB: ${DB_NAME:-graphdb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d  # Миграции пустые
    networks:
      - kg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-graph_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama сервер
  ollama:
    image: ollama/ollama:latest
    container_name: kg-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - kg-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python FastAPI 
  python-api:
    build:
      context: .                    
      dockerfile: Dockerfile.python 
    container_name: kg-python
    environment:
      - OLLAMA_URL=http://ollama:11434
      - HOST=0.0.0.0
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - kg-network
    volumes:
      - ./static:/app/static        
      - ./data:/app/data            
    restart: unless-stopped

  # Go бэкенд сервер
  go-server:
    build:
      context: ./repo               
      dockerfile: Dockerfile        
    container_name: kg-go
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-graph_user}
      - DB_PASSWORD=${DB_PASSWORD:-graph_password}
      - DB_NAME=${DB_NAME:-graphdb}
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-me}
      - PORT=8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kg-network
    restart: unless-stopped

networks:
  kg-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
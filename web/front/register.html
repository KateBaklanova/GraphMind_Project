<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 460px;
        }

        h2 {
            text-align: center;
            color: #1d7a3a;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid #cfe8d5;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2e9f52;
            color: white;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #248342;
        }

        .password-hint {
            background: #f0fff4;
            border: 1px solid #cde8d3;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 18px;
            font-size: 13px;
            line-height: 1.6;
            color: #2d5a36;
        }

        .link-block {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        a {
            color: #2e9f52;
            text-decoration: none;
            font-weight: bold;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .notification.success {
            background: #059669;
        }

        .notification.error {
            background: #dc2626;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Регистрация</h2>

    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Пароль">

    <div class="password-hint">
        <strong>Требования к паролю:</strong><br>
        • минимум 8 символов<br>
        • хотя бы 1 заглавная буква<br>
        • хотя бы 1 строчная буква<br>
        • хотя бы 1 цифра<br>
        • хотя бы 1 специальный символ (! @ # $ % и тд)
    </div>

    <button onclick="register()">Зарегистрироваться</button>

    <div class="link-block">
        Уже есть аккаунт? <a href="/login.html">Войти</a>
    </div>
</div>

<script>
function showNotification(message, isSuccess=true) {
    const notification = document.createElement('div');
    notification.className = `notification ${isSuccess ? 'success' : 'error'}`;
    notification.textContent = message;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.remove();
    }, 3000);
}

async function register() {
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!username || !email || !password) {
        showNotification("Заполните все поля", false);
        return;
    }

    try {
        const res = await fetch("/api/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                email: email,
                password: password
            })
        });

        const data = await res.json();

        if (res.ok) {
            showNotification("Успешная регистрация! Перенаправление на страницу входа...", true);
            setTimeout(() => {
                window.location.href = "/login.html";
            }, 2000);
        } else {
            const errorMsg = data.error || data.message || "Ошибка регистрации";
            showNotification(`${errorMsg}`, false);
        }
    } catch (error) {
        console.error("Ошибка:", error);
        showNotification("Ошибка соединения с сервером", false);
    }
}
</script>

</body>
</html>
